# Test that the docker image builds correctly
# and that running the ingestion and scoring programs works
# Also use cache for the data and the docker image.
# Test that the docker image used in the challenge works correctly
# by running the ingestion and scoring programs.
name: Test Docker Image

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Use your actual Docker Hub image name instead of building locally
      DOCKER_IMAGE_NAME: thomasdnil/oncosegment:v1 

    steps:
      - name: Delete unnecessary tools folder to free space
        run: |
          echo "Removing unnecessary software to prevent disk space issues..."
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/.ghcup || true
          df -h

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Pull Docker image from Hub
        # Pulling is faster and more reliable than building on the runner
        run: docker pull ${{ env.DOCKER_IMAGE_NAME }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        # This installs tools needed for data setup
        run: pip install -r requirements.txt

      - name: Prepare input/output directories
        # Uses your script to organize data for the test run
        run: python tools/setup_data.py

      - name: Test ingestion program
        # Runs the ingestion program inside your challenge environment
        run: |
          docker run --rm -u root \
              -v "./ingestion_program":"/app/ingestion_program" \
              -v "./dev_phase/input_data":/app/input_data \
              -v "./ingestion_res":/app/output \
              -v "./solution":/app/ingested_program \
              --name ingestion ${{ env.DOCKER_IMAGE_NAME }} \
                  python /app/ingestion_program/ingestion.py

      - name: Test scoring program
        # Runs the scoring program to verify the outputs
        run: |
          docker run --rm -u root \
              -v "./scoring_program":"/app/scoring_program" \
              -v "./dev_phase/reference_data":/app/input/ref \
              -v "./ingestion_res":/app/input/res \
              -v "./scoring_res":/app/output \
              --name scoring ${{ env.DOCKER_IMAGE_NAME }} \
                  python /app/scoring_program/scoring.py
